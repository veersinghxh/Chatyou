<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Offer/Answer Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for video elements and textareas */
        video {
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            background-color: #1f2937;
            transform: scaleX(-1); /* Mirror effect for local video */
        }
        textarea {
            resize: none;
        }
        /* Simple transition for better UX */
        .transition-all {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-cyan-400">WebRTC Offer/Answer Demo</h1>
            <p class="text-gray-400 mt-2">Create a direct peer-to-peer connection by exchanging offers and answers.</p>
        </header>

        <!-- Main Content Grid -->
        <main class="grid md:grid-cols-2 gap-8">
            
            <!-- Left Column: Videos and Controls -->
            <div class="flex flex-col gap-6">
                <!-- Videos -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <h2 class="text-lg font-semibold mb-2 text-gray-300">Your Camera</h2>
                        <video id="localVideo" autoplay muted playsinline></video>
                    </div>
                    <div>
                        <h2 class="text-lg font-semibold mb-2 text-gray-300">Peer's Camera</h2>
                        <video id="remoteVideo" autoplay playsinline></video>
                    </div>
                </div>

                <!-- Status Indicator -->
                <div id="status" class="text-center p-3 rounded-lg bg-gray-800 text-gray-300 transition-all">
                    Status: Idle
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <button id="startCameraButton" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 px-4 rounded-lg transition-all">
                        1. Start Camera
                    </button>
                    <button id="createOfferButton" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-all disabled:bg-gray-700 disabled:cursor-not-allowed" disabled>
                        2. Create Offer
                    </button>
                    <button id="connectButton" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition-all disabled:bg-gray-700 disabled:cursor-not-allowed" disabled>
                        3. Connect
                    </button>
                </div>
            </div>

            <!-- Right Column: Textareas for Offer/Answer -->
            <div class="flex flex-col gap-6">
                <!-- Input Textarea -->
                <div>
                    <label for="offerAnswerInput" class="block text-lg font-semibold mb-2 text-gray-300">Paste Offer / Answer Here</label>
                    <textarea id="offerAnswerInput" rows="10" class="w-full p-3 bg-gray-800 border-2 border-gray-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all" placeholder="Paste the SDP from the other peer..."></textarea>
                </div>

                <!-- Output Textarea -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="yourOfferOutput" class="block text-lg font-semibold text-gray-300">Your Offer / Answer</label>
                        <button id="copyButton" class="text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 py-1 px-3 rounded-md transition-all">Copy</button>
                    </div>
                    <textarea id="yourOfferOutput" rows="10" readonly class="w-full p-3 bg-gray-800 border-2 border-gray-700 rounded-lg cursor-not-allowed" placeholder="Your offer or answer will appear here..."></textarea>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- DOM Element References ---
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startCameraButton = document.getElementById('startCameraButton');
        const createOfferButton = document.getElementById('createOfferButton');
        const connectButton = document.getElementById('connectButton');
        const offerAnswerInput = document.getElementById('offerAnswerInput');
        const yourOfferOutput = document.getElementById('yourOfferOutput');
        const copyButton = document.getElementById('copyButton');
        const statusDiv = document.getElementById('status');

        // --- Global WebRTC Variables ---
        let peerConnection;
        let localStream;
        let remoteStream;

        // --- STUN Server Configuration ---
        // These servers help peers discover their public IP addresses.
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // --- Code Explanation & Logic ---

        /**
         * 1. START CAMERA
         * Accesses the user's camera and microphone.
         */
        const startCamera = async () => {
            try {
                // The `getUserMedia` API prompts the user for permission to use a media input.
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                // Display the local video stream in the 'localVideo' element.
                console.log(localStream);
                localVideo.srcObject = localStream;
                updateStatus('Camera started. Ready to create offer.');
                // Enable the next steps in the UI.
                createOfferButton.disabled = false;
                offerAnswerInput.addEventListener('input', () => {
                    connectButton.disabled = offerAnswerInput.value.length === 0;
                });
            } catch (error) {
                console.error('Error accessing media devices.', error);
                updateStatus('Error: Could not access camera.');
            }
        };

        /**
         * Initializes the RTCPeerConnection object and sets up all necessary event listeners.
         */
        const createPeerConnection = () => {
            // Create a new RTCPeerConnection with the STUN server configuration.
            peerConnection = new RTCPeerConnection(configuration);

            // --- Event Listener: onicecandidate ---
            // This event fires when the browser finds a network path (ICE candidate)
            // to connect to the other peer. We will collect all candidates and package
            // them with the offer/answer to simplify the copy-paste process.
            const iceCandidates = [];
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    iceCandidates.push(event.candidate);
                } else {
                    // When event.candidate is null, ICE gathering is complete.
                    // We update the output textarea with the complete SDP (including all candidates).
                    if(peerConnection.localDescription) {
                        yourOfferOutput.value = JSON.stringify(peerConnection.localDescription);
                        updateStatus('Offer/Answer generated. Copy and send to peer.');
                    }
                }
            };
            
            // --- Event Listener: ontrack ---
            // This event fires when the remote peer adds a media stream to the connection.
            peerConnection.ontrack = event => {
                console.log('Remote track received:', event);
                remoteStream = event.streams[0];
                remoteVideo.srcObject = remoteStream;
            };

            // --- Event Listener: onconnectionstatechange ---
            // Monitors the state of the connection and updates the UI.
            peerConnection.onconnectionstatechange = () => {
                updateStatus(`Connection state: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    statusDiv.classList.remove('bg-gray-800', 'bg-yellow-600');
                    statusDiv.classList.add('bg-emerald-600');
                } else if (peerConnection.connectionState === 'connecting') {
                     statusDiv.classList.remove('bg-gray-800');
                     statusDiv.classList.add('bg-yellow-600');
                }
            };

            // Add the local stream's tracks to the peer connection so they can be sent.
            localStream.getTracks().forEach(track => {
                console.log('Adding local track:', track);
                peerConnection.addTrack(track, localStream);
            });
        };

        /**
         * 2. CREATE OFFER
         * The initiating peer calls this to create an offer.
         */
        const createOffer = async () => {
            createPeerConnection();
            // `createOffer` generates an SDP (Session Description Protocol) string that
            // describes the caller's proposed connection settings (codecs, etc.).
            const offer = await peerConnection.createOffer();
            // `setLocalDescription` tells the local peer connection about its own offer.
            await peerConnection.setLocalDescription(offer);
            updateStatus('Creating offer and gathering ICE candidates...');
        };

        /**
         * 3. CONNECT
         * This function handles both creating an answer (if an offer is pasted)
         * and setting the final answer (if an answer is pasted).
         */
        const connect = async () => {
            try {
                const sessionDescription = JSON.parse(offerAnswerInput.value);

                if (sessionDescription.type === 'offer') {
                    // --- This peer is the ANSWERING peer ---
                    createPeerConnection();
                    // Set the received offer as the remote description.
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(sessionDescription));

                    // Create an answer to the received offer.
                    const answer = await peerConnection.createAnswer();
                    // Set the generated answer as the local description.
                    await peerConnection.setLocalDescription(answer);
                    updateStatus('Creating answer and gathering ICE candidates...');
                } else if (sessionDescription.type === 'answer') {
                    // --- This peer is the OFFERING peer ---
                    // Set the received answer as the remote description to complete the connection.
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(sessionDescription));
                }
            } catch (error) {
                console.error('Error connecting:', error);
                updateStatus('Error: Invalid Offer/Answer format.');
            }
        };

        // --- Utility Functions ---
        const updateStatus = (text) => {
            statusDiv.textContent = text;
            console.log(text);
        };
        
        const copyToClipboard = () => {
            yourOfferOutput.select();
            document.execCommand('copy');
            // A small visual feedback
            const originalText = copyButton.textContent;
            copyButton.textContent = 'Copied!';
            setTimeout(() => {
                copyButton.textContent = originalText;
            }, 1000);
        };

        // --- Event Listeners for Buttons ---
        startCameraButton.onclick = startCamera;
        createOfferButton.onclick = createOffer;
        connectButton.onclick = connect;
        copyButton.onclick = copyToClipboard;

    </script>
</body>
</html>
